services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: scholarship
      POSTGRES_USER: scholarship
      POSTGRES_PASSWORD: scholarship
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scholarship -d scholarship"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg://scholarship:scholarship@db:5432/scholarship
      APP_ENV: development
      SECRET_KEY: change-me-in-production
      COOKIE_SECURE: "false"
      FRONTEND_ORIGIN: http://localhost:5173
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./backend/storage:/app/storage
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000/api
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:

